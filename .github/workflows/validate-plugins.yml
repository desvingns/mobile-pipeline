name: validate-plugins

# CI gate for the mobile-pipeline marketplace. Runs on every PR (incl. the auto-opened
# improve/* PRs from the downstream self-improvement flow) and on push to main.
on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Manifests are valid JSON
        run: |
          set -e
          files=".claude-plugin/marketplace.json .agents/plugins/marketplace.json $(find claude-plugins codex-plugins -name plugin.json)"
          for f in $files; do echo "checking $f"; python3 -c "import json,sys; json.load(open('$f'))"; done

      - name: Shell scripts parse (bash -n)
        run: |
          set -e
          for d in lib claude-plugins templates selfimprove eval; do
            [ -d "$d" ] || continue
            find "$d" -name '*.sh' -print0 | while IFS= read -r -d '' s; do echo "bash -n $s"; bash -n "$s"; done
          done
          for s in bootstrap.sh install-spec.sh; do [ -f "$s" ] && { echo "bash -n $s"; bash -n "$s"; }; done

      - name: shellcheck (error severity)
        run: |
          set -e
          command -v shellcheck >/dev/null || { sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck; }
          # -S error: retrofit gate — block on real errors, not legacy style warnings
          for d in lib claude-plugins templates selfimprove eval; do
            [ -d "$d" ] || continue
            find "$d" -name '*.sh' -print0 | while IFS= read -r -d '' s; do echo "shellcheck $s"; shellcheck -S error "$s"; done
          done
          for s in bootstrap.sh install-spec.sh; do [ -f "$s" ] && { echo "shellcheck $s"; shellcheck -S error "$s"; }; done

      - name: No template-placeholder or marker leaks
        run: |
          set -e
          if grep -rnE '\{\{[A-Z_]+\}\}' claude-plugins codex-plugins; then
            echo "::error::placeholder {{...}} leaked into generated plugins"; exit 1; fi
          # mp-dev must be fully platform/tool-resolved; mp-spec intentionally keeps inert platform: comments
          if grep -rnE '<!-- /?(tool|platform):' claude-plugins/mp-dev codex-plugins/mp-dev; then
            echo "::error::tool/platform marker leaked into mp-dev"; exit 1; fi
          if grep -rnE '<!-- /?tool:' claude-plugins/mp-spec codex-plugins/mp-spec; then
            echo "::error::tool: marker leaked into mp-spec"; exit 1; fi

      - name: Generated trees match templates (regeneration drift)
        run: |
          set -e
          bash lib/build-marketplace.sh >/dev/null
          if ! git diff --quiet --ignore-cr-at-eol -- claude-plugins codex-plugins; then
            echo "::error::claude-plugins/ or codex-plugins/ is out of sync with templates/. Run ./lib/build-marketplace.sh and commit the result."
            git --no-pager diff --stat -- claude-plugins codex-plugins
            exit 1
          fi
          echo "plugin trees are in sync with templates/"
